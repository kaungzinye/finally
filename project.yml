name: Finally
options:
  bundleIdPrefix: com.kaungzinye
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  defaultConfig: Debug
schemes:
  Finally:
    build:
      targets:
        Finally: all
        FinallyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FinallyTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  base:
    DEVELOPMENT_TEAM: GN4UMU6766
    CODE_SIGN_STYLE: Automatic

targets:
  Finally:
    type: application
    platform: iOS
    sources:
      - Finally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaungzinye.finally
        INFOPLIST_VALUES: >-
          CFBundleDisplayName=Finally
          CFBundleShortVersionString=1.0
          CFBundleVersion=1
          UILaunchScreen_Generation=YES
          UIUserInterfaceStyle=Automatic
        CODE_SIGN_ENTITLEMENTS: Finally/Finally.entitlements
    info:
      path: Finally/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - finally
            CFBundleURLName: com.kaungzinye.finally
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.kaungzinye.finally.refresh
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: FinallyWidgetExtension
        embed: true

  FinallyWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - FinallyWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaungzinye.finally.widget
        CODE_SIGN_ENTITLEMENTS: FinallyWidget/FinallyWidget.entitlements
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Finally Widget
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    info:
      path: FinallyWidget/Info.plist
      properties:
        CFBundleDisplayName: Finally Widget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  FinallyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FinallyTests
    dependencies:
      - target: Finally
